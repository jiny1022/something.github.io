<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background-image: url('backgrounds/field.png'); /* default */
      background-size: contain;      /* keep full image visible */
      background-repeat: no-repeat;
      background-position: center;
      background-color: black;
      
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }
    
    .content {
      margin-top: 20px;
    }

    .content img {
      max-width: 300px;
      margin-top: 20px;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="content">
    <h1>Hello world!</h1>
    <p>Click a button to change the background!</p>

    <button onclick="changeBackground('backgrounds/field.png')">Field</button>
    <button onclick="changeBackground('backgrounds/desert.png')">Desert</button>
    <button onclick="changeBackground('backgrounds/lava_mountain.png')">Mountain</button>

    <img src="pets1/fish.png" alt="Fish">
  </div>
<script>
    function changeBackground(imagePath) {
      document.body.style.backgroundImage = `url('${imagePath}')`;
    }
  </script>
</body>
</html>
