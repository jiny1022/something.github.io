<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      position: relative; /* for background positioning */
      overflow: hidden;   /* prevent scrollbars from background blur */
    }

    /* Background div */
    #background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-image: url('backgrounds/field.png'); /* default */
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: black;
      z-index: -1;  /* behind everything */
      transition: filter 0.5s ease; /* smooth fog toggle */
    }

    /* Foreground content */
    .content {
      position: relative; /* keep above background */
      margin-top: 20px;
    }

    .content img {
      max-width: 300px;
      margin-top: 20px;
    }

    button {
      border: none;
      background: none;
      padding: 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <!-- Background div -->
  <div id="background"></div>

  <!-- Foreground content -->
  <div class="content">
    <h1>Hello world!</h1>
    <p>Click a button to change the background!</p>

    <button onclick="changeBackground('backgrounds/field.png')">Field</button>
    <button onclick="changeBackground('backgrounds/desert.png')">Desert</button>
    <button onclick="changeBackground('backgrounds/lava_mountain.png')">Mountain</button>
    <button onclick="toggleFog()">
      <img src="buttons/play">
    </button>

    <img src="pets1/fish.png" alt="Fish">
  </div>

  <script>
    let fogOn = false;

    function changeBackground(imagePath) {
      document.getElementById('background').style.backgroundImage = `url('${imagePath}')`;
    }

    function toggleFog() {
      fogOn = !fogOn;
      const bg = document.getElementById('background');
      if (fogOn) {
        bg.style.filter = 'blur(5px) brightness(80%)';
      } else {
        bg.style.filter = 'none';
      }
    }
  </script>
</body>
</html>
